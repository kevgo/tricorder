[package]
name = "tricorder"
version = "0.1.0"
edition = "2024"

[dependencies]

[dev-dependencies]
cucumber = "0.23.0"
itertools = "0.14.0"
mio = "1.2.1"
pretty = { package = "pretty_assertions", version = "1.4.1" }
tokio = { version = "1.52.3", features = [
  "fs",
  "io-util",
  "macros",
  "process",
  "rt",
] }

[[test]]
name = "cucumber" # the filename of the test
harness = false   # allows Cucumber to print output instead of libtest
test = false      # don't run this as part of "cargo test"

[lints.clippy]
pedantic = "warn"

[lints.rust]
unsafe_code = "forbid"
